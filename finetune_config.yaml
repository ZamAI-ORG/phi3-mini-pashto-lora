# Fine-tuning configuration for ZamAI Phi-3 Mini Pashto
base_model_name: microsoft/Phi-3-mini-4k-instruct

# Data
train_file: data/pashto_instruct_train.jsonl
eval_file: data/pashto_instruct_valid.jsonl   # optional; set to null or remove if not used
max_seq_length: 2048
prompt_template: "{instruction}\n{input}\n{output}"

# LoRA
lora_r: 64
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

# Training Hyperparameters
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 0.0002
num_train_epochs: 3
warmup_ratio: 0.03
weight_decay: 0.0
logging_steps: 25
eval_steps: 400
save_steps: 400
save_total_limit: 3
max_grad_norm: 1.0
seed: 42

# Precision & Memory
use_4bit: true
fp16: false
bf16: true
gradient_checkpointing: true

# Reporting
report_to: []   # add "wandb" or "tensorboard" if configured
